<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Service — Sout Network</title>
<link rel="icon" href="/assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body>
<div class="topbar">
  <div class="brand"><img src="/assets/logo-icon.png" class="logo" alt=""/><span><small>Sout Network</small>Metadata</span></div>
  <div class="nav" id="nav"></div>
</div>

<div class="wrap">
  <div class="head">
    <h1 id="title">Service</h1>
    <div class="sub" id="sub"></div>
  </div>

  <div class="card">
    <label class="field" id="inputLabel" for="input">Link</label>
    <div class="row">
      <input id="input" type="text" dir="ltr" placeholder="Paste the link here"/>
      <button id="go">Submit</button>
    </div>
    <div class="status" id="status"></div>
    <div class="hint" id="eta"></div>
  </div>

  <div class="card">
    <h2>My requests</h2>
    <table>
      <thead><tr><th>When</th><th>Link</th><th>Status</th><th>Result</th></tr></thead>
      <tbody id="rows"><tr><td colspan="4" class="hint">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const PATH=location.pathname;
const TYPE={'/copyright':'copyright','/youtube-owner':'youtube_owner','/yt-distributor':'yt_distributor'}[PATH]||'copyright';
let SERVICES={},ME={};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmt(iso){try{return new Date(iso).toLocaleString()}catch(_){return iso}}
async function post(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});return r.json()}
async function get(p){const r=await fetch(p);return r.json()}
function setStatus(m,e,ok){const s=$('status');s.textContent=m||'';s.className='status'+(e?' err':(ok?' ok':''))}

function buildNav(){
  const admin = ME.role==='admin' ? '<a href="/admin">Admin</a>' : '';
  $('nav').innerHTML = `
    <a href="/">Spotify</a>
    <a href="/copyright">Copyright</a>
    <a href="/youtube-owner">YT Owner</a>
    <a href="/yt-distributor">YT Distributor</a>
    <a href="/history">History</a>
    ${admin}
    <a href="#" id="logout">Sign out</a>`;
  $('logout').addEventListener('click',async e=>{e.preventDefault();await post('/api/logout');location.href='/login'});
  // highlight current
  document.querySelectorAll('#nav a').forEach(a=>{ if(a.getAttribute('href')===PATH) a.style.color='var(--ink)'; });
}

function fieldsText(svc,t){
  if(t.status!=='approved') return '';
  return svc.fields.map(f=>`<b>${esc(f.label)}:</b> ${esc(t.fields[f.key]||'—')}`).join('<br>');
}
function statusBadge(s){
  if(s==='approved')return '<span class="badge" style="background:#dcfce7;color:#15803d">approved</span>';
  if(s==='rejected')return '<span class="badge" style="background:#fee2e2;color:#b91c1c">rejected</span>';
  return '<span class="badge pending">pending</span>';
}

async function loadMine(){
  const d=await get('/api/my-requests?type='+TYPE); if(!d.ok)return;
  const svc=SERVICES[TYPE];
  $('rows').innerHTML = d.items.map(t=>`<tr>
    <td class="hint">${fmt(t.createdAt)}</td>
    <td class="mono" style="word-break:break-all;font-size:12px">${esc(t.input)}</td>
    <td>${statusBadge(t.status)}</td>
    <td>${t.status==='approved'?fieldsText(svc,t):(t.status==='pending'?'<span class="hint">waiting ('+esc(svc.eta)+')</span>':'—')}</td>
  </tr>`).join('') || '<tr><td colspan="4" class="hint">No requests yet.</td></tr>';
}

async function submit(){
  const input=$('input').value.trim();
  if(!input){setStatus('Paste a link first.',true);return}
  $('go').disabled=true; setStatus('Submitting…');
  const d=await post('/api/request',{type:TYPE,input});
  $('go').disabled=false;
  if(!d.ok){setStatus(d.error||'Failed.',true);return}
  setStatus('Submitted. You will get a result soon.',false,true);
  $('input').value=''; loadMine();
}

(async()=>{
  ME=await get('/api/me');
  buildNav();
  const s=await get('/api/services'); SERVICES=s.services||{};
  const svc=SERVICES[TYPE]||{title:'Service',inputLabel:'Link',eta:''};
  document.title=svc.title+' — Sout Network';
  $('title').textContent=svc.title;
  $('inputLabel').textContent=svc.inputLabel;
  $('sub').textContent='Submit a request. Our team will get you the result — usually within '+svc.eta+'.';
  $('eta').textContent='Typical response time: '+svc.eta+'.';
  loadMine();
  // light auto-refresh so approvals appear without reloading
  setInterval(loadMine, 20000);
})();
$('go').addEventListener('click',submit);
$('input').addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
</script>
</body>
</html>
